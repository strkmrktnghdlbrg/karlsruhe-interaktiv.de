name: Daily Hotel-Refresh

# Haelt die Stay22-Live-Hotelpreise frisch.
# Stay22 ToS erlaubt 60min Cache -> ein taeglicher Rebuild reicht.
#
# Variante A (empfohlen, sobald Cloudflare Pages verbunden ist):
#   Secret CF_DEPLOY_HOOK = Deploy-Hook-URL aus dem Pages-Dashboard.
#   Der Job POSTet dorthin, Cloudflare baut mit eigenen Env-Vars
#   (STAY22_API_KEY im Pages-Dashboard hinterlegen).
#
# Variante B (Fallback, ohne Cloudflare): leerer Commit triggert den
#   verbundenen Deploy. Nur aktiv wenn CF_DEPLOY_HOOK fehlt.

on:
  schedule:
    - cron: "0 5 * * *" # taeglich 05:00 UTC
  workflow_dispatch: {}

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Cloudflare Deploy-Hook ausloesen
        if: ${{ secrets.CF_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "${{ secrets.CF_DEPLOY_HOOK }}"

      - name: Fallback — leerer Commit
        if: ${{ secrets.CF_DEPLOY_HOOK == '' }}
        run: echo "Kein CF_DEPLOY_HOOK gesetzt — bitte Cloudflare-Deploy-Hook hinterlegen."
